apiVersion: v1
kind: Service
metadata:
  name: aiops-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  type: LoadBalancer
  selector:
    app: aiops-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
