apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-app
  template:
    metadata:
      labels:
        app: aiops-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
      - name: aiops-container
        image: aiopsregistry15069.azurecr.io/aiops-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
          - name: API_KEY
            valueFrom:
              secretKeyRef:
                name: api-secret
                key: API_Key
          - name: EVENTHUB_CONNECTION_STR
            valueFrom:
              secretKeyRef:
                name: eventhub-secret
                key: CONNECTION_STR
          - name: BLOB_CONNECTION_STRING
            valueFrom:
              secretKeyRef:
                name: azure-storage-secret
                key: AZURE_STORAGE_CONNECTION_STRING
